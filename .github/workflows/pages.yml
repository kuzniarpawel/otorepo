# OTOREPO — publikacja PWA na GitHub Pages z builda Vite (dist/).
#
# JEDNORAZOWA AKTYWACJA (ręcznie, w przeglądarce):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions".
# Do czasu przełączenia Pages serwuje jak dotąd root maina (zamrożony monolit),
# więc nic się nie psuje; po przełączeniu site = dist/ (index.html + alias
# otorepo.html dla starych instalacji + generowany sw.js z hashem zawartości).
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
